<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  width="100"
  height="100"
>
  <!-- Pencil body -->
  <polygon
    points="20,75 70,25 85,40 35,90"
    fill="#fdd835"
    stroke="black"
    stroke-width="4"
  />

  <!-- Pencil tip -->
  <polygon
    points="70,25 80,15 95,30 85,40"
    fill="#d7ccc8"
    stroke="black"
    stroke-width="4"
  />

  <!-- Lead -->
  <polygon
    points="80,15 85,10 100,25 95,30"
    fill="black"
    stroke="black"
    stroke-width="2"
  />

  <!-- Grip line -->
  <line
    x1="35"
    y1="90"
    x2="20"
    y2="75"
    stroke="black"
    stroke-width="4"
  />
</svg>