<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  width="100"
  height="100"
>
  <!-- Eraser body -->
  <polygon
    points="20,65 55,30 85,60 50,95"
    fill="#f48fb1"
    stroke="black"
    stroke-width="4"
  />

  <!-- Eraser edge -->
  <polygon
    points="55,30 70,15 95,40 85,60"
